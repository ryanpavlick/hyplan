name: Update CITATION.cff

on:
  push:
    tags: ['[0-9]*']  # Matches version tags like 0.9.3, 1.0.0

permissions:
  contents: write

jobs:
  update-citation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Update CITATION.cff version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          sed -i "s/^version: .*/version: ${VERSION}/" CITATION.cff
          echo "Updated CITATION.cff to version ${VERSION}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet CITATION.cff || {
            git add CITATION.cff
            git commit -m "Update CITATION.cff to ${GITHUB_REF#refs/tags/}"
            git push
          }
