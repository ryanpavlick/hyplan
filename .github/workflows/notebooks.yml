name: Notebook smoke test

# Executes a small set of representative notebooks end-to-end on a
# schedule, so we catch breakage in the notebooks even though they are
# not part of the unit-test suite.
#
# The committed .ipynb outputs are intentionally preserved for GitHub
# rendering, so this workflow runs each notebook into a throwaway
# temp file (--output) rather than rewriting the source. If a notebook
# fails, papermill exits non-zero and the matrix job goes red.

on:
  schedule:
    # 09:00 UTC daily (~02:00 PT, ~05:00 ET) — quiet time for runners.
    - cron: "0 9 * * *"
  workflow_dispatch:
  pull_request:
    paths:
      - "notebooks/tutorial.ipynb"
      - "notebooks/export_formats.ipynb"
      - "notebooks/aircraft_performance.ipynb"
      - "notebooks/profiling_lidar_planning.ipynb"
      - ".github/workflows/notebooks.yml"

jobs:
  papermill:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        notebook:
          # Canonical end-to-end workflow (covers most planning APIs).
          - tutorial.ipynb
          # Exercises every public function in hyplan.exports.
          - export_formats.ipynb
          # Exercises the Aircraft base class and several subclasses.
          - aircraft_performance.ipynb
          # Exercises the ProfilingLidar family (HSRL-2, HALO, CPL).
          - profiling_lidar_planning.ipynb

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          # [mag] enables magnetic_declination() in export_formats.ipynb.
          # openpyxl is required by pandas.read_excel() in the same notebook
          # for the round-trip verification cells. Other canonical notebooks
          # don't need any extras.
          pip install -e .[mag]
          pip install papermill ipykernel openpyxl

      - name: Execute ${{ matrix.notebook }}
        # --cwd notebooks/ keeps relative paths (e.g. ../notebooks/exampledata/...)
        # working the same way they do for an interactive user. The output
        # path goes to a temp file so we never rewrite the committed
        # notebook with stripped or re-executed cells.
        run: |
          papermill \
            --cwd notebooks \
            --kernel python3 \
            notebooks/${{ matrix.notebook }} \
            /tmp/${{ matrix.notebook }}
