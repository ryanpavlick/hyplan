name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install gdal==$(gdal-config --version)
          pip install -e .
          pip install pytest pytest-cov ruff mypy

      - name: Lint (ruff)
        run: ruff check hyplan tests

      - name: Type check (mypy, non-blocking)
        # Mypy is currently informational: the codebase has ~330 pre-existing
        # type errors that are being cleaned up incrementally. This job
        # reports them in the logs but does not fail the build.
        run: mypy hyplan || true

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=hyplan --cov-report=term-missing --cov-fail-under=60
